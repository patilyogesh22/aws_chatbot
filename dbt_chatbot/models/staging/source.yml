
version: 2

sources:
  - name: raw
    description: "Raw ingestion layer"
    schema: "{{ env_var('PG_SCHEMA', 'public') }}"

    tables:

      # -----------------------------
      # UNSTRUCTURED PIPELINE
      # -----------------------------
      - name: raw_chunks
        description: "Raw text chunks extracted from uploaded files"

        columns:
          - name: chunk_id
            data_tests:
              - unique
              - not_null

          - name: file_name
            data_tests:
              - not_null

          - name: chunk_text
            data_tests:
              - not_null

 