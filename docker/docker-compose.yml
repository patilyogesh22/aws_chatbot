
services:


  # ── FastAPI Backend ──────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: api

    ports:
      - "8000:8000"

    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../vector_store:/app/vector_store
      - ../dbt_chatbot:/app/dbt_chatbot
      - ~/.dbt:/root/.dbt

    restart: always

