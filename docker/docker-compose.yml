version: "3.9"

services:


  # ── FastAPI Backend ──────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: api

    ports:
      - "8000:8000"

    env_file:
      - ../.env

    volumes:
      - ../data:/app/data
      - ../vector_store:/app/vector_store
      - ../dbt_chatbot:/app/dbt_chatbot
      - ~/.dbt:/root/.dbt

    restart: always


  # ── Streamlit Frontend ───────────────────────────────
  frontend:
    image: python:3.11-slim

    container_name: frontend

    working_dir: /app

    command: >
      sh -c "pip install streamlit requests -q &&
             streamlit run frontend/streamlit_app.py
             --server.port 8501 --server.address 0.0.0.0"

    ports:
      - "8501:8501"

    env_file:
      - ../.env

    environment:
      API_URL: http://api:8000

    volumes:
      - ../frontend:/app/frontend

    depends_on:
      - api

    restart: always